<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Card background -->
  <rect width="100" height="100" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Bar 1 — gris azulado (bajo) -->
  <rect x="9" y="62" width="17" height="26" rx="4" fill="#94A3B8"/>

  <!-- Bar 2 — verde (mediano) -->
  <rect x="32" y="46" width="17" height="42" rx="4" fill="#10B981"/>

  <!-- Bar 3 — azul (alto) -->
  <rect x="55" y="28" width="17" height="60" rx="4" fill="#3B82F6"/>

  <!-- Línea de tendencia ascendente -->
  <path
    d="M 17.5,59 C 32,48 50,32 72,14"
    fill="none"
    stroke="#1B263B"
    stroke-width="2.8"
    stroke-linecap="round"/>

  <!-- Flecha en la punta (esquina superior derecha, apuntando arriba-derecha) -->
  <path
    d="M 61,14 L 73,14 L 73,26"
    fill="none"
    stroke="#1B263B"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Dot de inicio de línea -->
  <circle cx="17.5" cy="59" r="3" fill="#1B263B"/>
</svg>
