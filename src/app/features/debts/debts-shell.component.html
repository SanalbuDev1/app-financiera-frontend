<div class="debts-shell" [class.sidebar-open]="isSidebarOpen()" [class.dark]="isDarkTheme()">

  <!-- OVERLAY móvil -->
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar__brand">
      <img class="sidebar__brand-logo" src="logo.svg" alt="App Financiera logo" width="36" height="36"/>
      <span class="sidebar__brand-name">
        <span class="sidebar__brand-app">App</span>
        <span class="sidebar__brand-fin">Financiera</span>
      </span>
    </div>

    <ul class="sidebar__nav">
      @for (item of navItems; track item.label) {
        <li
          class="sidebar__nav-item"
          [class.sidebar__nav-item--active]="item.active"
          (click)="item.action()">
          <span class="sidebar__nav-icon">{{ item.icon }}</span>
          <span class="sidebar__nav-label">{{ item.label }}</span>
          @if (item.active) {
            <span class="sidebar__nav-dot"></span>
          }
        </li>
      }
    </ul>

    <div class="sidebar__footer">
      <button class="sidebar__theme-btn" (click)="toggleTheme()">
        {{ isDarkTheme() ? '☀️ Tema claro' : '🌙 Tema oscuro' }}
      </button>
      <button class="sidebar__logout-btn" (click)="onLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="debts-main">

    <!-- TOPBAR (móvil) -->
    <header class="topbar">
      <button class="topbar__menu-btn" (click)="toggleSidebar()" aria-label="Abrir menú">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar__title">
        <span class="topbar__icon">🏦</span>
        <span class="topbar__label">Mis Deudas</span>
      </div>
      <button class="topbar__logout" (click)="onLogout()">
        <span>Salir</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- CONTENIDO DE LA RUTA -->
    <router-outlet />

  </div>
</div>
