<!-- Backdrop -->
<div class="modal-backdrop" (click)="onClose()"></div>

<!-- Panel -->
<div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">

  <!-- Header -->
  <div class="modal-header">
    <div class="modal-header__icon">💰</div>
    <h2 class="modal-header__title" id="modal-title">Nuevo Ingreso</h2>
    <button class="modal-header__close" (click)="onClose()" aria-label="Cerrar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Formulario -->
  <form class="modal-form" [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Descripción -->
    <div class="form-field">
      <label class="form-field__label" for="description">Descripción</label>
      <input
        id="description"
        class="form-field__input"
        [class.form-field__input--error]="form.get('description')?.invalid && form.get('description')?.touched"
        type="text"
        placeholder="Ej: Salario abril"
        formControlName="description"
        autocomplete="off"/>
      @if (form.get('description')?.invalid && form.get('description')?.touched) {
        <span class="form-field__error">Mínimo 2 caracteres</span>
      }
    </div>

    <!-- Monto -->
    <div class="form-field">
      <label class="form-field__label" for="amount">Monto</label>
      <div class="form-field__input-wrapper">
        <span class="form-field__prefix">$</span>
        <input
          id="amount"
          class="form-field__input form-field__input--with-prefix"
          [class.form-field__input--error]="form.get('amount')?.invalid && form.get('amount')?.touched"
          type="number"
          placeholder="0.00"
          min="0.01"
          step="0.01"
          formControlName="amount"/>
      </div>
      @if (form.get('amount')?.invalid && form.get('amount')?.touched) {
        <span class="form-field__error">Ingresa un monto válido</span>
      }
    </div>

    <!-- Fecha -->
    <div class="form-field">
      <label class="form-field__label" for="date">Fecha</label>
      <input
        id="date"
        class="form-field__input"
        type="date"
        formControlName="date"/>
    </div>

    <!-- Categoría -->
    <div class="form-field">
      <label class="form-field__label">Categoría</label>
      <div class="category-grid">
        @for (cat of categories; track cat.label) {
          <button
            type="button"
            class="category-btn"
            [class.category-btn--active]="form.get('category')?.value === cat.value"
            (click)="form.patchValue({ category: cat.value })">
            <span class="category-btn__icon">{{ cat.icon }}</span>
            <span class="category-btn__label">{{ cat.label }}</span>
          </button>
        }
      </div>
    </div>

    <!-- Notas -->
    <div class="form-field">
      <label class="form-field__label" for="notes">Notas <span class="form-field__optional">(opcional)</span></label>
      <textarea
        id="notes"
        class="form-field__input form-field__textarea"
        placeholder="Agrega una nota..."
        formControlName="notes"
        rows="2">
      </textarea>
    </div>

    <!-- Acciones -->
    <div class="modal-actions">
      <button type="button" class="btn btn--secondary" (click)="onClose()">Cancelar</button>
      <button type="submit" class="btn btn--primary">Guardar ingreso</button>
    </div>

  </form>
</div>
